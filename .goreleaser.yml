version: 2

before:
  hooks:
    - go mod verify
    - go vet ./...
    - go test ./...

builds:
  - main: ./cmd/my
    binary: my
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/fluxinc/my-cli/internal/version.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "my-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: fluxinc
    name: my-cli
